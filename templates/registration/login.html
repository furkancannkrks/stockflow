<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | StockFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-6 col-lg-4">
        <h1 class="h3 mb-4">StockFlow</h1>
        <form method="post" class="border bg-white p-4 rounded-2 shadow-sm">
          {% csrf_token %}
          <h2 class="h5 mb-3">Sign in</h2>
          {% if form.non_field_errors %}
            <div class="alert alert-danger" role="alert">{{ form.non_field_errors }}</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
            <input
              class="form-control"
              id="{{ form.username.id_for_label }}"
              name="{{ form.username.html_name }}"
              type="text"
              autocomplete="username"
              required
              autofocus
            >
          </div>
          <div class="mb-3">
            <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
            <input
              class="form-control"
              id="{{ form.password.id_for_label }}"
              name="{{ form.password.html_name }}"
              type="password"
              autocomplete="current-password"
              required
            >
          </div>
          {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
          <button class="btn btn-primary w-100" type="submit">Sign in</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
