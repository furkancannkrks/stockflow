{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StockFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/stockflow.css' %}" rel="stylesheet">
</head>
<body class="{% block body_class %}bg-body-tertiary{% endblock %}">
  {% block navigation %}
    {% if user.is_authenticated %}
      {% include "partials/navigation.html" %}
    {% endif %}
  {% endblock %}
  <main class="{% block main_class %}container-fluid px-4 py-4{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
