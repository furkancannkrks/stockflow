{% if page_obj.paginator.num_pages > 1 %}
  <nav class="d-flex justify-content-between align-items-center border-top px-3 py-3" aria-label="Pagination">
    <span class="small text-body-secondary">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item{% if not page_obj.has_previous %} disabled{% endif %}">
        {% if page_obj.has_previous %}<a class="page-link" href="{% querystring page=page_obj.previous_page_number %}">Previous</a>{% else %}<span class="page-link">Previous</span>{% endif %}
      </li>
      <li class="page-item{% if not page_obj.has_next %} disabled{% endif %}">
        {% if page_obj.has_next %}<a class="page-link" href="{% querystring page=page_obj.next_page_number %}">Next</a>{% else %}<span class="page-link">Next</span>{% endif %}
      </li>
    </ul>
  </nav>
{% endif %}
